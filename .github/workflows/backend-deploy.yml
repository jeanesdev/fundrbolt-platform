name: Deploy Backend

on:
  workflow_dispatch:
    inputs:
      skip_migrations:
        description: 'Skip database migrations (use with caution)'
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/fundrbolt-backend
  RESOURCE_GROUP: fundrbolt-production-rg
  CONTAINER_APPS_ENV: fundrbolt-production-cae

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    outputs:
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=main-,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image digest
        run: |
          echo "Image digest: ${{ steps.build.outputs.digest }}"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://api.fundrbolt.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set image reference
        id: image
        run: |
          echo "ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Run database migrations
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_migrations }}
        run: |
          chmod +x ./infrastructure/scripts/run-migrations-container-apps.sh
          ./infrastructure/scripts/run-migrations-container-apps.sh \
            "${{ env.RESOURCE_GROUP }}" \
            "${{ env.CONTAINER_APPS_ENV }}" \
            "${{ steps.image.outputs.ref }}"

      - name: Update API Container App
        run: |
          az containerapp update \
            --name fundrbolt-production-api \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --image "${{ steps.image.outputs.ref }}"

      - name: Update Celery Worker Container App
        run: |
          az containerapp update \
            --name fundrbolt-production-worker \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --image "${{ steps.image.outputs.ref }}"

      - name: Update Celery Beat Container App
        run: |
          az containerapp update \
            --name fundrbolt-production-beat \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --image "${{ steps.image.outputs.ref }}"

      - name: Wait for API revision to activate
        run: |
          echo "Waiting for API to become healthy..."
          for i in $(seq 1 12); do
            STATUS=$(az containerapp revision list \
              --name fundrbolt-production-api \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --query '[0].properties.healthState' -o tsv 2>/dev/null || echo "Unknown")
            echo "  Attempt $i/12: health=$STATUS"
            if [[ "$STATUS" == "Healthy" ]]; then
              echo "Revision is healthy."
              break
            fi
            sleep 10
          done

      - name: Verify production health endpoint
        continue-on-error: true
        run: |
          for i in $(seq 1 6); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.fundrbolt.com/health || echo "000")
            echo "  /health returned HTTP $HTTP_STATUS"
            if [[ "$HTTP_STATUS" == "200" ]]; then
              echo "Health check passed."
              exit 0
            fi
            sleep 15
          done
          echo "Health check failed after retries."
          exit 1
