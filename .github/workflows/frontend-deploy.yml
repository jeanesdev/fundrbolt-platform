name: Deploy Frontend (Admin PWA)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'frontend/fundrbolt-admin/**'
      - 'frontend/shared/**'
      - '.github/workflows/frontend-deploy.yml'

permissions:
  contents: read
  id-token: write

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://admin.fundrbolt.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        working-directory: ./frontend/fundrbolt-admin
        run: pnpm install --frozen-lockfile

      - name: Build application
        working-directory: ./frontend/fundrbolt-admin
        run: pnpm build
        env:
          VITE_API_URL: https://api.fundrbolt.com
          VITE_ENVIRONMENT: production
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN_ADMIN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: fundrbolt-admin

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ADMIN_PROD }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: '/frontend/fundrbolt-admin/dist'
          output_location: ''
          skip_app_build: true

      - name: Verify production deployment
        run: |
          for i in $(seq 1 6); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://admin.fundrbolt.com || echo "000")
            echo "  Attempt $i/6: HTTP $HTTP_STATUS"
            if [[ "$HTTP_STATUS" == "200" ]]; then exit 0; fi
            sleep 15
          done
          echo "Deployment verification failed."
          exit 1
