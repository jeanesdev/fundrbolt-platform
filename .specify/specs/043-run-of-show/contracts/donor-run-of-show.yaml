openapi: "3.1.0"
info:
  title: Donor Run-of-Show API
  version: "1.0.0"
  description: Public endpoint for donors to view the event timeline.

tags:
  - name: donor-run-of-show
    description: Donor-facing event timeline

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    DonorRunOfShowItem:
      type: object
      description: >
        Run-of-show item filtered to donor-visible items only.
        is_complete is included so past items can appear visually distinct.
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        scheduled_time:
          type: string
          format: date-time
        is_complete:
          type: boolean
        display_order:
          type: integer

    DonorRunOfShowResponse:
      type: object
      properties:
        items:
          type: array
          description: "Donor-visible items only, ordered by display_order"
          items:
            $ref: "#/components/schemas/DonorRunOfShowItem"
        next_item:
          $ref: "#/components/schemas/DonorRunOfShowItem"
          nullable: true
          description: "Next uncompleted item with scheduled_time in the future"

security:
  - BearerAuth: []

paths:
  /events/{event_id}/run-of-show:
    get:
      summary: Get donor-visible run-of-show for an event
      description: >
        Returns only items with donor_visible=true. Returns empty items array
        (not 404) if no donor-visible items exist. Requires donor authentication.
        Donors who are registered for the event can access this.
      tags: [donor-run-of-show]
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Donor-visible timeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DonorRunOfShowResponse"
        "401": { description: Unauthorized }
        "403": { description: Not registered for this event }
        "404": { description: Event not found }
