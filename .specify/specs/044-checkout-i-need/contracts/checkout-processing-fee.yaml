openapi: "3.1.0"
info:
  title: "Checkout — Processing Fee Config (Super Admin)"
  version: "1.0.0"
  description: "Global processing fee percentage configuration — Super Admin only"

paths:
  /api/v1/admin/processing-fee-config:
    get:
      operationId: getProcessingFeeConfig
      summary: Get current global processing fee rate
      tags: [Processing Fee - Super Admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current rate configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessingFeeConfigResponse"

    post:
      operationId: setProcessingFeeConfig
      summary: Set a new global processing fee rate (appends to audit log)
      description: >
        Inserts a new row in processing_fee_configs. The new rate takes effect
        for any checkout opened after this call; existing open checkouts retain
        their snapshotted rate. Super Admin role required.
      tags: [Processing Fee - Super Admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProcessingFeeConfigCreateRequest"
      responses:
        "201":
          description: New rate created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessingFeeConfigResponse"
        "400":
          description: Rate must be between 0 and 1 (inclusive)
        "403":
          description: Super Admin role required

  /api/v1/admin/processing-fee-config/history:
    get:
      operationId: getProcessingFeeConfigHistory
      summary: List all historical fee rate changes (audit trail)
      tags: [Processing Fee - Super Admin]
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: History of rate changes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessingFeeConfigHistoryResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ProcessingFeeConfigResponse:
      type: object
      required: [id, rate, rate_percent, created_by_email, created_at]
      properties:
        id:
          type: string
          format: uuid
        rate:
          type: number
          description: Decimal rate (e.g. 0.029)
          example: 0.029
        rate_percent:
          type: number
          description: Percentage representation (e.g. 2.9)
          example: 2.9
        created_by_email:
          type: string
          format: email
        created_at:
          type: string
          format: date-time

    ProcessingFeeConfigCreateRequest:
      type: object
      required: [rate]
      properties:
        rate:
          type: number
          minimum: 0
          maximum: 1
          description: Decimal rate, e.g. 0.029 for 2.9%
          example: 0.029

    ProcessingFeeConfigHistoryResponse:
      type: object
      required: [items, total, page, per_page]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProcessingFeeConfigResponse"
        total:
          type: integer
        page:
          type: integer
        per_page:
          type: integer
