version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: fundrbolt_postgres
    environment:
      POSTGRES_USER: fundrbolt_user
      POSTGRES_PASSWORD: fundrbolt_password
      POSTGRES_DB: fundrbolt_db
    ports:
      - "5432:5432"
    volumes:
      - fundrbolt_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fundrbolt_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fundrbolt_redis
    ports:
      - "6379:6379"
    volumes:
      - fundrbolt_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: fundrbolt_azurite
    ports:
      - "10000:10000"  # Blob service
      - "10001:10001"  # Queue service
      - "10002:10002"  # Table service
    volumes:
      - fundrbolt_azurite_data:/data
    command: "azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --loose"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "10000"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fundrbolt_celery_worker
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgresql://fundrbolt_user:fundrbolt_password@postgres:5432/fundrbolt_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/2
      CELERY_RESULT_BACKEND: redis://redis:6379/3
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-super-secret-jwt-key-change-in-production}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-DoNotReply@fundrbolt.com}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-admin@fundrbolt.com}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-ChangeMe123!}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "app.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fundrbolt_celery_beat
    command: celery -A app.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://fundrbolt_user:fundrbolt_password@postgres:5432/fundrbolt_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/2
      CELERY_RESULT_BACKEND: redis://redis:6379/3
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-super-secret-jwt-key-change-in-production}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-DoNotReply@fundrbolt.com}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-admin@fundrbolt.com}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-ChangeMe123!}
    depends_on:
      redis:
        condition: service_healthy

volumes:
  fundrbolt_postgres_data:
  fundrbolt_redis_data:
  fundrbolt_azurite_data:
